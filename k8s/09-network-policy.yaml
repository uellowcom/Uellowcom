apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odoo-network-policy
  namespace: odoo
spec:
  podSelector:
    matchLabels:
      app: odoo
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: odoo
    ports:
    - protocol: TCP
      port: 8069
    - protocol: TCP
      port: 8072
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
