apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-config
  namespace: odoo
data:
  odoo.conf: |
    [options]
    admin_passwd = admin
    db_host = postgres-service
    db_port = 5432
    db_user = odoo
    db_password = odoo
    database = odoo
    list_db = True
    addons_path = /mnt/extra-addons,/mnt/uellowcom,/mnt/enterprise-addons
    data_dir = /var/lib/odoo
    logfile = /var/log/odoo/odoo.log
    log_level = info
    log_handler = :INFO
    log_db = False
    log_db_level = warning
    workers = 4
    max_cron_threads = 2
    limit_memory_hard = 2684354560
    limit_memory_soft = 2147483648
    limit_request = 8192
    limit_time_cpu = 600
    limit_time_real = 1200
    limit_time_real_cron = 0
    proxy_mode = True
    xmlrpc = True
    xmlrpc_interface = 
    xmlrpc_port = 8069
    longpolling_port = 8072
