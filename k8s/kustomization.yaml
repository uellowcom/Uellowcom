apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: odoo

resources:
  - 01-namespace.yaml
  - 02-configmap.yaml
  - 03-secrets.yaml
  - 04-postgres.yaml
  - 05-odoo-deployment.yaml
  - 06-odoo-service.yaml
  - 07-ingress.yaml
  - 08-hpa.yaml
  - 09-network-policy.yaml

images:
  - name: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
    newTag: latest

commonLabels:
  app.kubernetes.io/name: odoo
  app.kubernetes.io/instance: production
  app.kubernetes.io/component: erp
  app.kubernetes.io/part-of: uellowcom
  app.kubernetes.io/managed-by: kubectl
