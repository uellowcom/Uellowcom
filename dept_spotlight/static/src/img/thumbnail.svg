<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- background -->
  <rect width="200" height="120" rx="10" fill="url(#bg)"/>
  <rect width="200" height="120" rx="10" fill="url(#glow)"/>
  <!-- sidebar -->
  <rect x="8" y="8" width="60" height="104" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <!-- badge -->
  <rect x="14" y="16" width="46" height="9" rx="4" fill="rgba(124,58,237,0.25)"/>
  <circle cx="19" cy="20.5" r="2.5" fill="#7C3AED"/>
  <rect x="24" y="18.5" width="30" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- dept name lines -->
  <rect x="14" y="30" width="44" height="7" rx="3" fill="rgba(255,255,255,0.8)"/>
  <rect x="14" y="41" width="34" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- sub text -->
  <rect x="14" y="52" width="44" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  <rect x="14" y="57" width="36" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
  <!-- CTA button -->
  <rect x="14" y="90" width="44" height="14" rx="7" fill="#7C3AED"/>
  <rect x="20" y="95" width="24" height="4" rx="2" fill="rgba(255,255,255,0.8)"/>
  <!-- product cards -->
  <rect x="76" y="8" width="34" height="104" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <rect x="80" y="12" width="26" height="60" rx="5" fill="rgba(255,255,255,0.08)"/>
  <rect x="80" y="76" width="22" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="80" y="83" width="18" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="80" y="93" width="14" height="5" rx="2" fill="#7C3AED" fill-opacity="0.9"/>

  <rect x="116" y="8" width="34" height="104" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <rect x="120" y="12" width="26" height="60" rx="5" fill="rgba(255,255,255,0.08)"/>
  <rect x="120" y="76" width="22" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="120" y="83" width="16" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="120" y="93" width="14" height="5" rx="2" fill="#7C3AED" fill-opacity="0.9"/>

  <rect x="156" y="8" width="34" height="104" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <rect x="160" y="12" width="26" height="60" rx="5" fill="rgba(255,255,255,0.08)"/>
  <rect x="160" y="76" width="22" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="160" y="83" width="18" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="160" y="93" width="14" height="5" rx="2" fill="#7C3AED" fill-opacity="0.9"/>
